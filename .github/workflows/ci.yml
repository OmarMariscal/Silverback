name: CI Pipeline (Monorepo)

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-check:
    name: Validar Código 
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm' 
          
      - name: Instalar dependencias del Monorepo (Clean Install)
        run: npm ci

      - name: Build del Backend (NestJS)
        run: npm run build --workspace=backend

      - name: Build del Frontend (NextJS)
        run: npm run build --workspace=frontend